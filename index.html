<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f0e8;
  color: #1a1612;
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
  padding-bottom: 60px;
}
h1 {
  font-size: 18px;
  font-weight: 700;
  color: #C0181A;
  margin-bottom: 2px;
}
.subtitle {
  font-size: 12px;
  color: #888;
  margin-bottom: 20px;
}
.name-row {
  margin-bottom: 16px;
}
.name-row label {
  display: block;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
#nameInput {
  width: 100%;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  background: #fff;
}
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
  color: #444;
}
.tab.active {
  background: #C0181A;
  color: #fff;
  border-color: #C0181A;
}
.add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.add-row select {
  flex: 1 1 140px;
}
.add-row input[type="number"] {
  flex: 0 0 64px;
}
.add-row .btn-add {
  flex: 1 0 auto;
}
select {
  flex: 1;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  background: #fff;
}
input[type="number"] {
  width: 64px;
  padding: 9px 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  text-align: center;
}
.btn-add {
  padding: 9px 16px;
  background: #C0181A;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-add:active { background: #a01414; }
#statusMsg {
  font-size: 12px;
  color: #2a8a2a;
  min-height: 16px;
  margin-bottom: 16px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: #fff;
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #e8e0d0;
}
.stat-label {
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
}
.stat-value {
  font-size: 18px;
  font-weight: 700;
  color: #1a1612;
}
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.history-title {
  font-size: 14px;
  font-weight: 600;
}
.btn-clear {
  padding: 6px 10px;
  background: #f5e0e0;
  color: #C0181A;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}
.history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 13px;
}
.history-name { font-weight: 600; }
.history-qty { color: #888; }
.history-person {
  display: inline-block;
  font-size: 11px;
  background: #f0e8e0;
  color: #6b4c1e;
  padding: 1px 8px;
  border-radius: 10px;
  margin-left: 6px;
}
.history-date {
  font-size: 11px;
  color: #aaa;
  margin-top: 2px;
}
.btn-del {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #f0e8e8;
  border: none;
  color: #C0181A;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}
.empty-state {
  text-align: center;
  padding: 24px 0;
  color: #bbb;
  font-size: 13px;
}
.admin-link {
  text-align: center;
  margin-top: 28px;
}
.admin-link a {
  font-size: 11px;
  color: #bbb;
  text-decoration: none;
}
.admin-section {
  display: none;
  margin-top: 24px;
  border-top: 1px solid #e0d8c8;
  padding-top: 20px;
}
.admin-section.visible { display: block; }
.admin-gate {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.admin-gate input {
  flex: 1;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
}
.admin-gate button {
  padding: 9px 14px;
  background: #1a1612;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}
#adminError {
  font-size: 12px;
  color: #C0181A;
  margin-top: 6px;
  min-height: 16px;
}
.report-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 13px;
}
.report-name { font-weight: 500; }
.report-qty {
  font-weight: 700;
  color: #C0181A;
  background: #f5e0e0;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
}
.category-header {
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin: 16px 0 6px;
}
.category-header:first-child { margin-top: 0; }
.stock-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 13px;
  gap: 8px;
}
.stock-name { flex: 1; font-weight: 500; }
.stock-input {
  width: 56px;
  padding: 6px 4px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  text-align: center;
}
.stock-consumed {
  font-size: 13px;
  font-weight: 600;
  color: #C0181A;
  min-width: 36px;
  text-align: right;
}
.history-row-readonly {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 13px;
}
.sig-block{margin-top:14px}
.sig-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sig-header label{font-size:12px;font-weight:600;color:#1a1612}
.sig-clear{background:none;border:none;color:#C0181A;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
.sig-canvas{width:100%;height:110px;background:#fff;border:1px solid #ddd;border-radius:8px;touch-action:none;display:block}
.sig-hint{font-size:11px;color:#999;margin-top:6px}
.sig-thumb{width:50px;height:24px;object-fit:contain;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;display:inline-block;margin-left:8px;vertical-align:middle}
.sig-view-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center}
.sig-view-overlay.open{display:flex}
.sig-view-box{background:#fff;border-radius:12px;padding:20px;max-width:90vw}
.sig-view-box img{max-width:100%;display:block}
.sig-view-close{display:block;margin:14px auto 0;padding:8px 18px;background:#1a1612;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<h1>Consum propriu</h1>
<p class="subtitle">Mille Saporri — evidență personală</p>

<div class="name-row">
  <label for="nameInput">Cine consumă</label>
  <input type="text" id="nameInput" placeholder="Numele tău" list="namesSuggest">
  <datalist id="namesSuggest"></datalist>
</div>

<div class="tabs" id="catTabs"></div>

<div class="add-row">
  <select id="prodSelect"></select>
  <input type="number" id="qtyInput" value="1" min="1">
</div>

<div class="sig-block">
  <div class="sig-header">
    <label>Semnătură (obligatorie)</label>
    <button type="button" class="sig-clear" id="sigClearBtn">Șterge</button>
  </div>
  <canvas id="sigCanvas" class="sig-canvas"></canvas>
  <div class="sig-hint">Semnează cu degetul ca să confirmi că tu ai consumat produsul.</div>
</div>

<button class="btn-add" id="addBtn" style="width:100%;margin-top:10px;">Adaugă</button>

<div id="statusMsg"></div>

<div class="admin-link" style="margin-top:14px;">
  <a href="#" id="adminToggle">Admin</a>
</div>

<div class="admin-section" id="adminSection">
  <div class="admin-gate" id="adminGate">
    <input type="text" id="adminCode" placeholder="Cod admin" autocomplete="off" style="-webkit-text-security: disc;">
    <button id="adminUnlock">Deblochează</button>
  </div>
  <div id="adminError"></div>

  <div id="adminContent" style="display:none;">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total buc.</div>
        <div class="stat-value" id="totalQty">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Înregistrări</div>
        <div class="stat-value" id="totalEntries">0</div>
      </div>
    </div>

    <div class="history-header">
      <span class="history-title">Stoc &amp; consum pe produs</span>
    </div>
    <div class="sig-hint" style="margin-bottom:8px;">Introdu stocul curent pentru fiecare produs. Se salvează automat.</div>
    <div id="productReport" style="margin-bottom:20px;"></div>

    <div class="history-header">
      <span class="history-title">Istoric</span>
      <button class="btn-clear" id="clearBtn">Șterge tot</button>
    </div>

    <div id="historyList"></div>

    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #e8e0d0;">
      <label style="display:block; font-size:11px; color:#888; margin-bottom:6px;">Schimbă codul admin</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="newAdminCode" placeholder="Cod nou" autocomplete="off" style="flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; font-size:16px;">
        <button id="saveAdminCode" style="padding:9px 14px; background:#1a1612; color:#fff; border:none; border-radius:8px; font-size:13px; cursor:pointer;">Salvează</button>
      </div>
      <div id="codeChangeMsg" style="font-size:12px; color:#2a8a2a; margin-top:6px; min-height:16px;"></div>
    </div>
  </div>
</div>

<div class="history-header" style="margin-top:24px;">
  <span class="history-title">Istoric consum</span>
</div>
<div id="publicHistoryList"></div>

<div class="sig-view-overlay" id="sigViewOverlay" onclick="closeSigView(event)">
  <div class="sig-view-box">
    <img id="sigViewImg" src="" alt="Semnătură">
    <button class="sig-view-close" onclick="closeSigView()">Închide</button>
  </div>
</div>

<script>
const PRODUCTS = {"Băuturi Reci":["Cola 0.25L", "Cola 0.5L", "Cola zero 0.25L", "Cola zero 0.5L", "Fanta 0.25L", "Fanta 0.5L", "Fanta Madness", "Sprite", "Schweppes Kinley", "Schweppes Mandarin", "Schweppes Bitter Lemon", "Schweppes Raspberry", "Fuzetea Lemon", "Fuzetea Peach", "Cappy Piersici", "Cappy Portocale Roșii", "Dorna Plată 0.33L", "Dorna Plată 0.75L", "Dorna Minerală 0.33L", "Dorna Minerală 0.75L", "Apă Cooler Mentă & Lime", "Apă Cooler Afine", "Ursus 0.33L", "Ursus 0.5L", "Peroni 0.33L", "Peroni 0.5L", "Ursus Cooler Lemon", "Ursus Cooler Zmeură și Mure", "Ursus Nefiltrată de Grâu", "Kozel", "Ursus Black", "Timișoreana", "Ursus Remix Căpșuna, Zmeură & Lămâie", "Ursus Remix Soc, Mentă & Lime"],"Cocktail / Mocktail":["Aperol Spritz","Hugo","Gin Tonic","Negroni","Tequila Sunrise","Mojito","Pina Colada","Cosmopolitan","Virgin Mojito","Virgin Pina Colada"],"Cafele":["Espresso Dublu","Macchiato","Ristretto","Cappuccino","Latte","Americano","Irish Coffee","Frappé"],"Vinuri & Spirtoase":["Nomad Fetească Regală demisec","Karakter Chardonnay sec","Metamorfosis Rosé","Artisan Fetească Neagră","Via Marchizului Pinot Noir","Gramma Prosecco"]};

const STORAGE_KEY = 'mille-saporri-consum-history';
const NAME_KEY = 'mille-saporri-consum-lastname';
const STOCK_KEY = 'mille-saporri-consum-stock';

let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let stock = JSON.parse(localStorage.getItem(STOCK_KEY) || '{}');
let activeCategory = Object.keys(PRODUCTS)[0];

const ADMIN_CODE_KEY = 'mille-saporri-admin-code';
const ADMIN_SESSION_KEY = 'mille-saporri-admin-unlocked';

function getAdminCode() {
  return localStorage.getItem(ADMIN_CODE_KEY) || '1234';
}

document.getElementById('adminToggle').onclick = (e) => {
  e.preventDefault();
  const section = document.getElementById('adminSection');
  section.classList.toggle('visible');
};

document.getElementById('adminUnlock').onclick = () => {
  const code = document.getElementById('adminCode').value;
  const err = document.getElementById('adminError');
  if (code === getAdminCode()) {
    sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    err.textContent = '';
    render();
  } else {
    err.textContent = 'Cod incorect.';
  }
};

document.getElementById('adminCode').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('adminUnlock').click();
});

document.getElementById('saveAdminCode').onclick = () => {
  const newCode = document.getElementById('newAdminCode').value.trim();
  const msg = document.getElementById('codeChangeMsg');
  if (!newCode || newCode.length < 3) {
    msg.style.color = '#C0181A';
    msg.textContent = 'Codul trebuie să aibă minim 3 caractere.';
    return;
  }
  localStorage.setItem(ADMIN_CODE_KEY, newCode);
  msg.style.color = '#2a8a2a';
  msg.textContent = 'Cod actualizat.';
  document.getElementById('newAdminCode').value = '';
  setTimeout(() => { msg.textContent = ''; }, 2500);
};

document.getElementById('newAdminCode').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('saveAdminCode').click();
});

if (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1') {
  document.getElementById('adminGate').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
}

document.getElementById('nameInput').value = localStorage.getItem(NAME_KEY) || '';

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  if (window.fbdb) {
    window.fbdb.ref('consum/log').set(history).catch(function(e) {
      console.error('Firebase save error:', e);
    });
  }
}

function saveStock() {
  localStorage.setItem(STOCK_KEY, JSON.stringify(stock));
  if (window.fbdb) {
    window.fbdb.ref('consum/stock').set(stock).catch(function(e) {
      console.error('Firebase stock save error:', e);
    });
  }
}

if (window.fbdb) {
  window.fbdb.ref('consum/stock').on('value', function(snapshot) {
    var data = snapshot.val();
    stock = data && typeof data === 'object' ? data : {};
    localStorage.setItem(STOCK_KEY, JSON.stringify(stock));
    if (typeof render === 'function') render();
  }, function(err) {
    console.error('Firebase stock read error:', err);
  });
}

if (window.fbdb) {
  window.fbdb.ref('consum/log').on('value', function(snapshot) {
    var data = snapshot.val();
    history = Array.isArray(data) ? data : [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    if (typeof render === 'function') render();
  }, function(err) {
    console.error('Firebase read error:', err);
  });
}

function getKnownNames() {
  const names = new Set();
  history.forEach(h => { if (h.person) names.add(h.person); });
  return Array.from(names);
}

function renderNameSuggestions() {
  const datalist = document.getElementById('namesSuggest');
  datalist.innerHTML = '';
  getKnownNames().forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    datalist.appendChild(opt);
  });
}

function renderTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  Object.keys(PRODUCTS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; render(); };
    tabs.appendChild(btn);
  });
}

function renderSelect() {
  const sel = document.getElementById('prodSelect');
  sel.innerHTML = '';
  PRODUCTS[activeCategory].forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function renderStats() {
  const totalQty = history.reduce((s, h) => s + h.qty, 0);
  const tq = document.getElementById('totalQty');
  const te = document.getElementById('totalEntries');
  if (tq) tq.textContent = totalQty;
  if (te) te.textContent = history.length;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  list.innerHTML = '';
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">Nicio înregistrare încă</div>';
    return;
  }
  const sorted = history.slice().reverse();
  sorted.forEach((h) => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const date = new Date(h.ts);
    const dateStr = date.toLocaleDateString('ro-RO', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' + date.toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit' });

    const left = document.createElement('div');
    const personBadge = h.person ? '<span class="history-person">' + h.person + '</span>' : '';
    left.innerHTML = '<span class="history-name">' + h.name + '</span> <span class="history-qty">×' + h.qty + '</span>' + personBadge + '<div class="history-date">' + dateStr + '</div>';

    if (h.sig) {
      const sigImg = document.createElement('img');
      sigImg.src = h.sig;
      sigImg.className = 'sig-thumb';
      sigImg.onclick = () => viewSig(h.sig);
      left.appendChild(sigImg);
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.textContent = '×';
    delBtn.onclick = () => {
      const idx = history.indexOf(h);
      if (idx > -1) history.splice(idx, 1);
      saveHistory();
      render();
    };

    row.appendChild(left);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

function updateStockValue(name, rawVal) {
  const val = parseInt(rawVal);
  if (isNaN(val) || val < 0) {
    stock[name] = 0;
  } else {
    stock[name] = val;
  }
  saveStock();
  renderProductReport();
}

function renderProductReport() {
  const container = document.getElementById('productReport');
  if (!container) return;
  container.innerHTML = '';
  const consumed = {};
  history.forEach(h => {
    consumed[h.name] = (consumed[h.name] || 0) + h.qty;
  });
  Object.keys(PRODUCTS).forEach(cat => {
    const header = document.createElement('div');
    header.className = 'category-header';
    header.textContent = cat;
    container.appendChild(header);

    PRODUCTS[cat].forEach(name => {
      const qtyConsumed = consumed[name] || 0;
      const qtyStock = stock[name] || 0;

      const row = document.createElement('div');
      row.className = 'stock-row';

      const nameEl = document.createElement('span');
      nameEl.className = 'stock-name';
      nameEl.textContent = name;

      const stockInput = document.createElement('input');
      stockInput.type = 'number';
      stockInput.className = 'stock-input';
      stockInput.min = '0';
      stockInput.value = qtyStock;
      stockInput.onchange = () => updateStockValue(name, stockInput.value);

      const consumedEl = document.createElement('span');
      consumedEl.className = 'stock-consumed';
      consumedEl.textContent = '-' + qtyConsumed;

      row.appendChild(nameEl);
      row.appendChild(stockInput);
      row.appendChild(consumedEl);
      container.appendChild(row);
    });
  });
}

function renderPublicHistory() {
  const list = document.getElementById('publicHistoryList');
  if (!list) return;
  list.innerHTML = '';
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">Nicio înregistrare încă</div>';
    return;
  }
  const sorted = history.slice().reverse();
  sorted.forEach((h) => {
    const row = document.createElement('div');
    row.className = 'history-row-readonly';
    const date = new Date(h.ts);
    const dateStr = date.toLocaleDateString('ro-RO', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' + date.toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit' });
    const personBadge = h.person ? '<span class="history-person">' + h.person + '</span>' : '';
    row.innerHTML = '<div><span class="history-name">' + h.name + '</span> <span class="history-qty">×' + h.qty + '</span>' + personBadge + '<div class="history-date">' + dateStr + '</div></div>';
    list.appendChild(row);
  });
}

function render() {
  renderTabs();
  renderSelect();
  renderStats();
  renderHistory();
  renderNameSuggestions();
  renderPublicHistory();
  renderProductReport();
}

/* ===== SEMNATURA DIGITALA ===== */
var sigCanvas = document.getElementById('sigCanvas');
var sigCtx = null;
var sigDrawing = false;
var sigHasStroke = false;
var sigLastX = 0, sigLastY = 0;

function resizeSigCanvas() {
  if (!sigCanvas) return;
  var rect = sigCanvas.getBoundingClientRect();
  var ratio = window.devicePixelRatio || 1;
  sigCanvas.width = rect.width * ratio;
  sigCanvas.height = rect.height * ratio;
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.scale(ratio, ratio);
}

function clearSignature() {
  if (!sigCtx || !sigCanvas) return;
  var rect = sigCanvas.getBoundingClientRect();
  sigCtx.clearRect(0, 0, rect.width, rect.height);
  sigHasStroke = false;
}

function initSignaturePad() {
  if (!sigCanvas) return;
  resizeSigCanvas();

  function getPos(e) {
    var rect = sigCanvas.getBoundingClientRect();
    var x, y;
    if (e.touches && e.touches.length) { x = e.touches[0].clientX - rect.left; y = e.touches[0].clientY - rect.top; }
    else { x = e.clientX - rect.left; y = e.clientY - rect.top; }
    return { x: x, y: y };
  }
  function start(e) {
    sigDrawing = true;
    var p = getPos(e);
    sigLastX = p.x; sigLastY = p.y;
    e.preventDefault();
  }
  function move(e) {
    if (!sigDrawing) return;
    var p = getPos(e);
    sigCtx.strokeStyle = '#1a1612';
    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    sigCtx.lineJoin = 'round';
    sigCtx.beginPath();
    sigCtx.moveTo(sigLastX, sigLastY);
    sigCtx.lineTo(p.x, p.y);
    sigCtx.stroke();
    sigLastX = p.x; sigLastY = p.y;
    sigHasStroke = true;
    e.preventDefault();
  }
  function end() { sigDrawing = false; }

  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', move);
  sigCanvas.addEventListener('mouseup', end);
  sigCanvas.addEventListener('mouseleave', end);
  sigCanvas.addEventListener('touchstart', start, { passive: false });
  sigCanvas.addEventListener('touchmove', move, { passive: false });
  sigCanvas.addEventListener('touchend', end, { passive: false });
}

document.getElementById('sigClearBtn').addEventListener('click', clearSignature);
initSignaturePad();
window.addEventListener('resize', resizeSigCanvas);

document.getElementById('addBtn').onclick = () => {
  const sel = document.getElementById('prodSelect');
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  const person = document.getElementById('nameInput').value.trim();
  const status = document.getElementById('statusMsg');
  if (!person) {
    status.textContent = 'Introdu numele tău mai întâi.';
    status.style.color = '#C0181A';
    return;
  }
  if (!sigHasStroke) {
    status.textContent = 'Semnează pentru a confirma consumul.';
    status.style.color = '#C0181A';
    return;
  }
  const sigData = sigCanvas.toDataURL('image/png');
  history.push({ name: sel.value, qty: qty, person: person, sig: sigData, ts: Date.now() });
  saveHistory();
  localStorage.setItem(NAME_KEY, person);
  status.style.color = '#2a8a2a';
  status.textContent = 'Adăugat: ' + sel.value + ' ×' + qty + ' (' + person + ')';
  clearSignature();
  render();
  setTimeout(() => { status.textContent = ''; }, 2000);
};

document.getElementById('clearBtn').onclick = () => {
  if (!confirm('Sigur ștergi tot istoricul?')) return;
  history = [];
  saveHistory();
  render();
};

function viewSig(src) {
  document.getElementById('sigViewImg').src = src;
  document.getElementById('sigViewOverlay').classList.add('open');
}
function closeSigView(ev) {
  if (ev && ev.target !== document.getElementById('sigViewOverlay')) return;
  document.getElementById('sigViewOverlay').classList.remove('open');
}

render();
</script>
