<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consum propriu — Mille Saporri</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f0e8;
  color: #1a1612;
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
  padding-bottom: 60px;
}
h1 {
  font-size: 18px;
  font-weight: 700;
  color: #C0181A;
  margin-bottom: 2px;
}
.subtitle {
  font-size: 12px;
  color: #888;
  margin-bottom: 20px;
}
.name-row {
  margin-bottom: 16px;
}
.name-row label {
  display: block;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
#nameInput {
  width: 100%;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  background: #fff;
}
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
  color: #444;
}
.tab.active {
  background: #C0181A;
  color: #fff;
  border-color: #C0181A;
}
.add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
select {
  flex: 1;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  background: #fff;
}
input[type="number"] {
  width: 64px;
  padding: 9px 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  text-align: center;
}
.btn-add {
  padding: 9px 16px;
  background: #C0181A;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-add:active { background: #a01414; }
#statusMsg {
  font-size: 12px;
  color: #2a8a2a;
  min-height: 16px;
  margin-bottom: 16px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: #fff;
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #e8e0d0;
}
.stat-label {
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
}
.stat-value {
  font-size: 18px;
  font-weight: 700;
  color: #1a1612;
}
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.history-title {
  font-size: 14px;
  font-weight: 600;
}
.btn-clear {
  padding: 6px 10px;
  background: #f5e0e0;
  color: #C0181A;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}
.history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 13px;
}
.history-name { font-weight: 600; }
.history-qty { color: #888; }
.history-person {
  display: inline-block;
  font-size: 11px;
  background: #f0e8e0;
  color: #6b4c1e;
  padding: 1px 8px;
  border-radius: 10px;
  margin-left: 6px;
}
.history-date {
  font-size: 11px;
  color: #aaa;
  margin-top: 2px;
}
.btn-del {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #f0e8e8;
  border: none;
  color: #C0181A;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}
.empty-state {
  text-align: center;
  padding: 24px 0;
  color: #bbb;
  font-size: 13px;
}
.admin-link {
  text-align: center;
  margin-top: 28px;
}
.admin-link a {
  font-size: 11px;
  color: #bbb;
  text-decoration: none;
}
.admin-section {
  display: none;
  margin-top: 24px;
  border-top: 1px solid #e0d8c8;
  padding-top: 20px;
}
.admin-section.visible { display: block; }
.admin-gate {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.admin-gate input {
  flex: 1;
  padding: 9px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
}
.admin-gate button {
  padding: 9px 14px;
  background: #1a1612;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}
#adminError {
  font-size: 12px;
  color: #C0181A;
  margin-top: 6px;
  min-height: 16px;
}
</style>
</head>
<body>

<h1>Consum propriu</h1>
<p class="subtitle">Mille Saporri — evidență personală</p>

<div class="name-row">
  <label for="nameInput">Cine consumă</label>
  <input type="text" id="nameInput" placeholder="Numele tău" list="namesSuggest">
  <datalist id="namesSuggest"></datalist>
</div>

<div class="tabs" id="catTabs"></div>

<div class="add-row">
  <select id="prodSelect"></select>
  <input type="number" id="qtyInput" value="1" min="1">
  <button class="btn-add" id="addBtn">Adaugă</button>
</div>

<div id="statusMsg"></div>

<div class="admin-link">
  <a href="#" id="adminToggle">Admin</a>
</div>

<div class="admin-section" id="adminSection">
  <div class="admin-gate" id="adminGate">
    <input type="text" id="adminCode" placeholder="Cod admin" autocomplete="off" style="-webkit-text-security: disc;">
    <button id="adminUnlock">Deblochează</button>
  </div>
  <div id="adminError"></div>

  <div id="adminContent" style="display:none;">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total buc.</div>
        <div class="stat-value" id="totalQty">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Înregistrări</div>
        <div class="stat-value" id="totalEntries">0</div>
      </div>
    </div>

    <div class="history-header">
      <span class="history-title">Istoric</span>
      <button class="btn-clear" id="clearBtn">Șterge tot</button>
    </div>

    <div id="historyList"></div>

    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #e8e0d0;">
      <label style="display:block; font-size:11px; color:#888; margin-bottom:6px;">Schimbă codul admin</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="newAdminCode" placeholder="Cod nou" autocomplete="off" style="flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; font-size:16px;">
        <button id="saveAdminCode" style="padding:9px 14px; background:#1a1612; color:#fff; border:none; border-radius:8px; font-size:13px; cursor:pointer;">Salvează</button>
      </div>
      <div id="codeChangeMsg" style="font-size:12px; color:#2a8a2a; margin-top:6px; min-height:16px;"></div>
    </div>
  </div>
</div>

<script>
const PRODUCTS = {"Băuturi Reci":["Cola","Cola zero","Fanta","Fanta Madness","Sprite","Schweppes Kinley","Schweppes Mandarin","Schweppes Bitter Lemon","Schweppes Raspberry","Fuzetea Lemon","Fuzetea Peach","Cappy Piersici","Cappy Portocale Roșii","Dorna Plată","Dorna Minerală","Apă Cooler Mentă & Lime","Apă Cooler Afine","Ursus","Peroni","Ursus Cooler Lemon","Ursus Cooler Zmeură și Mure","Ursus Nefiltrată de Grâu","Kozel","Ursus Black","Timișoreana","Ursus Remix Căpșuna, Zmeură & Lămâie","Ursus Remix Soc, Mentă & Lime"],"Cocktail / Mocktail":["Aperol Spritz","Hugo","Gin Tonic","Negroni","Tequila Sunrise","Mojito","Pina Colada","Cosmopolitan","Virgin Mojito","Virgin Pina Colada"],"Cafele":["Espresso Dublu","Macchiato","Ristretto","Cappuccino","Latte","Americano","Irish Coffee","Frappé"],"Vinuri & Spirtoase":["Nomad Fetească Regală demisec","Karakter Chardonnay sec","Metamorfosis Rosé","Artisan Fetească Neagră","Via Marchizului Pinot Noir","Gramma Prosecco"]};

const STORAGE_KEY = 'mille-saporri-consum-history';
const NAME_KEY = 'mille-saporri-consum-lastname';

let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let activeCategory = Object.keys(PRODUCTS)[0];

const ADMIN_CODE_KEY = 'mille-saporri-admin-code';
const ADMIN_SESSION_KEY = 'mille-saporri-admin-unlocked';

function getAdminCode() {
  return localStorage.getItem(ADMIN_CODE_KEY) || '1234';
}

document.getElementById('adminToggle').onclick = (e) => {
  e.preventDefault();
  const section = document.getElementById('adminSection');
  section.classList.toggle('visible');
};

document.getElementById('adminUnlock').onclick = () => {
  const code = document.getElementById('adminCode').value;
  const err = document.getElementById('adminError');
  if (code === getAdminCode()) {
    sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    err.textContent = '';
    render();
  } else {
    err.textContent = 'Cod incorect.';
  }
};

document.getElementById('adminCode').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('adminUnlock').click();
});

document.getElementById('saveAdminCode').onclick = () => {
  const newCode = document.getElementById('newAdminCode').value.trim();
  const msg = document.getElementById('codeChangeMsg');
  if (!newCode || newCode.length < 3) {
    msg.style.color = '#C0181A';
    msg.textContent = 'Codul trebuie să aibă minim 3 caractere.';
    return;
  }
  localStorage.setItem(ADMIN_CODE_KEY, newCode);
  msg.style.color = '#2a8a2a';
  msg.textContent = 'Cod actualizat.';
  document.getElementById('newAdminCode').value = '';
  setTimeout(() => { msg.textContent = ''; }, 2500);
};

document.getElementById('newAdminCode').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('saveAdminCode').click();
});

if (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1') {
  document.getElementById('adminGate').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
}

document.getElementById('nameInput').value = localStorage.getItem(NAME_KEY) || '';

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function getKnownNames() {
  const names = new Set();
  history.forEach(h => { if (h.person) names.add(h.person); });
  return Array.from(names);
}

function renderNameSuggestions() {
  const datalist = document.getElementById('namesSuggest');
  datalist.innerHTML = '';
  getKnownNames().forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    datalist.appendChild(opt);
  });
}

function renderTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  Object.keys(PRODUCTS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; render(); };
    tabs.appendChild(btn);
  });
}

function renderSelect() {
  const sel = document.getElementById('prodSelect');
  sel.innerHTML = '';
  PRODUCTS[activeCategory].forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function renderStats() {
  const totalQty = history.reduce((s, h) => s + h.qty, 0);
  const tq = document.getElementById('totalQty');
  const te = document.getElementById('totalEntries');
  if (tq) tq.textContent = totalQty;
  if (te) te.textContent = history.length;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  list.innerHTML = '';
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">Nicio înregistrare încă</div>';
    return;
  }
  const sorted = history.slice().reverse();
  sorted.forEach((h) => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const date = new Date(h.ts);
    const dateStr = date.toLocaleDateString('ro-RO', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' + date.toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit' });

    const left = document.createElement('div');
    const personBadge = h.person ? '<span class="history-person">' + h.person + '</span>' : '';
    left.innerHTML = '<span class="history-name">' + h.name + '</span> <span class="history-qty">×' + h.qty + '</span>' + personBadge + '<div class="history-date">' + dateStr + '</div>';

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.textContent = '×';
    delBtn.onclick = () => {
      const idx = history.indexOf(h);
      if (idx > -1) history.splice(idx, 1);
      saveHistory();
      render();
    };

    row.appendChild(left);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

function render() {
  renderTabs();
  renderSelect();
  renderStats();
  renderHistory();
  renderNameSuggestions();
}

document.getElementById('addBtn').onclick = () => {
  const sel = document.getElementById('prodSelect');
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  const person = document.getElementById('nameInput').value.trim();
  if (!person) {
    document.getElementById('statusMsg').textContent = 'Introdu numele tău mai întâi.';
    document.getElementById('statusMsg').style.color = '#C0181A';
    return;
  }
  history.push({ name: sel.value, qty: qty, person: person, ts: Date.now() });
  saveHistory();
  localStorage.setItem(NAME_KEY, person);
  const status = document.getElementById('statusMsg');
  status.style.color = '#2a8a2a';
  status.textContent = 'Adăugat: ' + sel.value + ' ×' + qty + ' (' + person + ')';
  render();
  setTimeout(() => { status.textContent = ''; }, 2000);
};

document.getElementById('clearBtn').onclick = () => {
  if (!confirm('Sigur ștergi tot istoricul?')) return;
  history = [];
  saveHistory();
  render();
};

render();
</script>
</body>
</html>
